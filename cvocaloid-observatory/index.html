<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術力口观察日志</title>
<!-- CDN preconnect -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Non-blocking font load — falls back to system serif if unavailable -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"></noscript>
<!-- Chart.js: jsdelivr (China CDN) primary, cdnjs fallback -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js'"></script>
<style>

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2330;
    --accent: #4fd1c7;
    --accent2: #f6ad55;
    --danger: #fc8181;
    --text: #e2e8f0;
    --muted: #718096;
    --grid: rgba(78,201,196,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  header { padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
  h1 { font-size: clamp(18px, 4vw, 26px); font-weight: 700; letter-spacing: .02em; }
  .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: .08em; text-transform: uppercase; }
  .last-updated { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(79,209,199,.12); border: 1px solid rgba(79,209,199,.3);
    color: var(--accent); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 3px 8px; border-radius: 4px; letter-spacing: .08em;
  }

  /* Section titles */
  .section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: .15em; text-transform: uppercase;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 40px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-delta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-delta.up { color: #68d391; }
  .stat-delta.down { color: var(--danger); }

  /* Info tooltips */
  .info-tip {
    position: relative; display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%; cursor: help;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--muted); border: 1px solid var(--border);
    margin-left: 4px; vertical-align: middle; flex-shrink: 0;
  }
  .info-tip:hover, .info-tip:focus { color: var(--accent); border-color: var(--accent); outline: none; }
  .info-tip .tip-text {
    visibility: hidden; opacity: 0;
    position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: #1a1d26; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    font-size: 11px; font-weight: 400; color: var(--text);
    line-height: 1.5; white-space: normal; width: 220px;
    z-index: 10; pointer-events: none;
    transition: opacity .15s;
  }
  .info-tip:hover .tip-text,
  .info-tip:focus .tip-text,
  .info-tip:focus-within .tip-text { visibility: visible; opacity: 1; }

  /* Keyword cards */
  .keyword-grid { display: grid; gap: 16px; margin-bottom: 40px; }
  .kw-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; transition: border-color .2s;
    cursor: pointer;
  }
  .kw-card:hover { border-color: rgba(79,209,199,.4); }
  .kw-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .kw-name { font-size: 16px; font-weight: 700; }
  .kw-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .kw-chart-wrap { height: 60px; }
  .anomaly-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: rgba(252,129,129,.12); border: 1px solid rgba(252,129,129,.3);
    color: var(--danger); padding: 2px 7px; border-radius: 4px; margin-top: 10px;
  }
  .kw-expand-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted); margin-top: 10px; text-align: right;
  }
  .kw-card.expanded .kw-expand-hint .hint-collapsed { display: none; }
  .kw-card:not(.expanded) .kw-expand-hint .hint-expanded { display: none; }

  /* Expandable detail section */
  .kw-details {
    max-height: 0; overflow: hidden;
    transition: max-height .3s ease;
  }
  .kw-card.expanded .kw-details { max-height: 2000px; }
  .kw-details-inner {
    padding-top: 14px; margin-top: 14px;
    border-top: 1px solid var(--border);
  }
  .kw-details-title {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .video-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; padding: 6px 0;
    border-bottom: 1px solid rgba(30,35,48,.6);
    font-size: 13px;
  }
  .video-row:last-child { border-bottom: none; }
  .video-title {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .video-title a {
    color: var(--text); text-decoration: none;
  }
  .video-title a:hover { color: var(--accent); text-decoration: underline; }
  .video-stats {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); white-space: nowrap;
  }

  /* Bar chart overview */
  .bar-chart-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; margin-bottom: 40px;
    height: 420px;
  }

  /* Author line in video rows */
  .video-author {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted); margin-top: 2px;
  }
  .video-author a { color: var(--muted); text-decoration: none; }
  .video-author a:hover { color: var(--accent); }

  /* Off-topic warning badge */
  .off-topic-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--accent2); border: 1px solid rgba(246,173,85,.3);
    background: rgba(246,173,85,.08); padding: 1px 6px; border-radius: 3px;
    margin-left: 6px; vertical-align: middle; white-space: nowrap;
  }
  .video-row.off-topic { opacity: .6; }
  .video-row.off-topic .video-title a { color: var(--muted); }

  /* Keyword definition in expanded card */
  .kw-definition {
    font-size: 12px; color: var(--muted); line-height: 1.6;
    margin-bottom: 12px; padding: 8px 12px;
    background: rgba(79,209,199,.04);
    border-left: 2px solid rgba(79,209,199,.3);
    border-radius: 0 4px 4px 0;
  }

  /* Bubble cloud */
  .bubble-cloud-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; margin-bottom: 40px;
    position: relative; overflow: hidden;
  }
  .bubble-legend {
    display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--muted);
  }
  .bubble-legend-item {
    display: flex; align-items: center; gap: 4px;
  }
  .bubble-legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .bubble-field {
    position: relative;
    min-height: 320px;
    margin: 0 auto;
  }
  .bubble {
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; cursor: default;
    position: absolute;
    font-size: 11px; font-weight: 600; text-align: center;
    line-height: 1.2; padding: 8px;
    transition: transform .25s, box-shadow .25s;
    animation: bubble-float 6s ease-in-out infinite;
    word-break: keep-all;
  }
  .bubble:hover {
    transform: scale(1.15);
    z-index: 5;
  }
  .bubble-glow {
    transform: scale(1.08);
    z-index: 4;
    filter: brightness(1.4);
    transition: transform .3s, filter .3s;
  }
  .bubble-dim {
    opacity: .35;
    transition: opacity .3s;
  }
  .bubble .bubble-tip {
    visibility: hidden; opacity: 0;
    position: absolute;
    background: #1a1d26; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px;
    font-size: 11px; font-weight: 400; color: var(--text);
    line-height: 1.5; white-space: normal; width: 200px;
    z-index: 20; pointer-events: none;
    transition: opacity .15s;
    text-align: left;
  }
  .bubble:hover .bubble-tip,
  .bubble:focus .bubble-tip,
  .bubble:focus-within .bubble-tip { visibility: visible; opacity: 1; }
  .bubble-tip-play { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .bubble-tip-def { margin-top: 4px; color: var(--muted); position: relative; }
  .bubble-related {
    margin-top: 6px; display: flex; flex-wrap: wrap; gap: 3px;
  }
  .bubble-related-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    border-radius: 3px; padding: 1px 5px; color: var(--text);
  }
  @keyframes bubble-float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .bubble:nth-child(2n) { animation-delay: -1.5s; }
  .bubble:nth-child(3n) { animation-delay: -3s; animation-duration: 7s; }
  .bubble:nth-child(5n) { animation-delay: -4.5s; animation-duration: 8s; }
  .bubble:nth-child(7n) { animation-delay: -2s; animation-duration: 5s; }

  /* AI-generated label — subtle watermark */
  .ai-label {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: var(--muted); opacity: .4;
    float: right; margin: -2px 0 0 6px;
  }

  /* Anomaly feed */
  .anomaly-feed { margin-bottom: 40px; }
  .anomaly-item {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--danger);
    border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 10px;
  }
  .anomaly-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .anomaly-desc { font-size: 14px; line-height: 1.6; }
  .anomaly-kw { color: var(--accent2); font-weight: 700; }
  .anomaly-mult { color: var(--danger); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* Report embed */
  .report-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; margin-bottom: 40px;
  }
  .report-box h3 { font-size: 15px; margin-bottom: 10px; color: var(--accent2); }
  .report-box p { font-size: 13px; color: var(--muted); line-height: 1.8; }

  /* Footer */
  footer { border-top: 1px solid var(--border); padding-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; }

  .loading {
    text-align: center; padding: 80px 20px;
    color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .loading-spinner {
    display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-status { margin-top: 8px; font-size: 11px; color: var(--muted); }
  .load-error {
    text-align: center; padding: 60px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .load-error .error-icon { font-size: 28px; margin-bottom: 12px; opacity: .6; }
  .load-error .error-msg { color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
  .load-error .error-detail { font-size: 11px; color: var(--border); margin-bottom: 16px; }
  .retry-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--accent); background: rgba(79,209,199,.08);
    border: 1px solid rgba(79,209,199,.3); border-radius: 6px;
    padding: 8px 20px; cursor: pointer; transition: all .2s;
  }
  .retry-btn:hover { background: rgba(79,209,199,.16); border-color: var(--accent); }

  /* Mobile responsive */
  @media (max-width: 480px) {
    .wrap { padding: 16px 12px 40px; }
    .kw-card { padding: 16px; }

    /* Stack keyword name above search count */
    .kw-header { flex-wrap: wrap; gap: 4px; }
    .kw-name { width: 100%; }

    /* Wrap play count + delta onto separate lines if needed */
    .stat-delta { word-break: break-word; line-height: 1.6; }

    /* Stack video row: title above stats */
    .video-row { flex-wrap: wrap; }
    .video-title { width: 100%; white-space: normal; }
    .video-stats { font-size: 10px; }

    /* Keep tooltips within viewport — anchor left on mobile */
    .info-tip .tip-text {
      width: 180px;
      left: 0; right: auto;
      transform: none;
    }

    /* Smaller stat cards */
    .stats-grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 18px; }

    /* Bar chart shorter on mobile */
    .bar-chart-wrap { height: 420px; padding: 12px; }

    /* Bubbles smaller on mobile */
    .bubble { font-size: 9px; }
    .bubble .bubble-tip { width: 160px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <div class="logo">
          <div class="logo-dot"></div>
          <h1>術力口观察日志</h1>
        </div>
        <div class="subtitle">中文社区电子人声软件趋势监测 · Vocaloid / UTAU / SynthV</div>
      </div>
      <div style="text-align:right">
        <div class="live-badge">● LIVE</div>
        <div class="last-updated" id="last-updated" style="margin-top:6px">加载中...</div>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading" id="loading-state">
      <div class="loading-spinner"></div>
      <div>正在加载数据...</div>
      <div class="loading-status" id="loading-status"></div>
    </div>
  </div>

  <footer>
    大中文圈術力口观察日志 · 数据来源：Bilibili · 每日 09:00 JST 自动更新
  </footer>
</div>

<script>
// ─── Loading state helpers ─────────────────────────────────────────────────────
function setLoadingStatus(msg) {
  const el = document.getElementById('loading-status');
  if (el) el.textContent = msg;
}

function showError(detail) {
  const app = document.getElementById('app');
  app.textContent = '';
  const container = document.createElement('div');
  container.className = 'load-error';
  const icon = document.createElement('div');
  icon.className = 'error-icon';
  icon.textContent = '⚠';
  container.appendChild(icon);
  const msg = document.createElement('div');
  msg.className = 'error-msg';
  msg.textContent = '数据加载失败，请稍后重试。';
  container.appendChild(msg);
  if (detail) {
    const detailEl = document.createElement('div');
    detailEl.className = 'error-detail';
    detailEl.textContent = detail;
    container.appendChild(detailEl);
  }
  const btn = document.createElement('button');
  btn.className = 'retry-btn';
  btn.type = 'button';
  btn.textContent = '重新加载';
  btn.addEventListener('click', loadData);
  container.appendChild(btn);
  app.appendChild(container);
  document.getElementById('last-updated').textContent = '加载失败';
}

// ─── Render ────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e4) return (n/1e4).toFixed(1) + 'w';
  return n.toLocaleString();
}

function fmtResultCount(n) {
  // Bilibili API caps numResults at 1000
  if (n === 1000) return '≥1,000';
  return fmt(n);
}

function infoIcon(text) {
  return `<span class="info-tip" tabindex="0" role="button" aria-label="说明">?<span class="tip-text">${text}</span></span>`;
}

// Group color map (fallback for demo/missing config)
const DEFAULT_GROUPS = {
  umbrella:    { label: '总称/通用',     color: '#4fd1c7' },
  vocaloid_jp: { label: '日系 VOCALOID', color: '#63b3ed' },
  vocaloid_cn: { label: '中文 VOCALOID', color: '#fc8181' },
  utau:        { label: 'UTAU',          color: '#f6ad55' },
  synthv:      { label: 'Synthesizer V', color: '#b794f4' },
  other:       { label: '其他引擎',       color: '#68d391' },
};

function escapeHtml(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function renderApp(data) {
  const app = document.getElementById('app');
  const lu = new Date(data.last_updated);
  document.getElementById('last-updated').textContent =
    '更新于 ' + lu.toLocaleString('zh-CN', {timeZone:'Asia/Tokyo', hour12:false}) + ' JST';

  const groups = data.keyword_groups && Object.keys(data.keyword_groups).length > 0
    ? data.keyword_groups
    : DEFAULT_GROUPS;

  const anomalyHtml = data.anomalies.length > 0
    ? data.anomalies.map(a => `
        <div class="anomaly-item">
          <div class="anomaly-date">${a.date}</div>
          <div class="anomaly-desc">
            <span class="anomaly-kw">${escapeHtml(a.keyword)}</span>
            <span class="anomaly-mult"> ↑${a.multiplier} </span>
            ${escapeHtml(a.description)}
          </div>
        </div>
      `).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:12px 0">暂无异常事件</div>';

  const reportWeek = data.latest_report ? data.latest_report.week : '—';
  const reportRange = data.latest_report ? data.latest_report.range : '—';
  const reportSummary = data.latest_report ? data.latest_report.summary : '尚无周报数据。';

  app.innerHTML = `
    <!-- Stats -->
    <div class="section-title">总览</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">追踪关键词 ${infoIcon('config/keywords.yaml 中定义的搜索关键词数量。')}</div>
        <div class="stat-value">${data.summary.total_keywords}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本周总播放 ${infoIcon('近7日所有关键词搜索结果中视频播放量的总和。数据来源：Bilibili 公开搜索 API。')}</div>
        <div class="stat-value">${fmt(data.summary.total_play_week)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">异常事件 ${infoIcon('播放量超过7日均值 3 倍，或搜索量单日激增 50% 以上时触发。')}</div>
        <div class="stat-value" style="color:var(--danger)">${data.summary.anomaly_count}</div>
      </div>
    </div>

    <!-- Bar chart: play count by keyword -->
    <div class="section-title">今日播放量排行 ${infoIcon('各关键词今日搜索结果中视频播放量总和对比。数据来源：Bilibili 公开搜索 API。')}</div>
    <div class="bar-chart-wrap"><canvas id="bar-chart"></canvas></div>

    <!-- Bubble cloud -->
    <div class="section-title">关键词关联图谱 ${infoIcon('气泡大小 = 播放量，颜色 = 所属分类，悬停查看释义与关联词。<br><span class="ai-label">释义由 AI 生成，仅供参考。</span>')}</div>
    <div class="bubble-cloud-wrap">
      <div class="bubble-legend" id="bubble-legend"></div>
      <div class="bubble-field" id="bubble-field"></div>
    </div>

    <!-- Keywords -->
    <div class="section-title">关键词热度（近7日）</div>
    <div class="keyword-grid" id="kw-grid"></div>

    <!-- Anomalies -->
    <div class="section-title">异常事件</div>
    <div class="anomaly-feed">${anomalyHtml}</div>

    <!-- Weekly report -->
    <div class="section-title">本周简报 · ${reportWeek}</div>
    <div class="report-box">
      <h3>${reportRange}</h3>
      <p>${reportSummary}</p>
    </div>
  `;

  // ── Bar chart ──────────────────────────────────────────────────────────
  // ── Stacked bar chart: top 5 video breakdown per keyword ─────────────
  const chartAvailable = typeof Chart !== 'undefined';
  const top15 = data.keywords.slice(0, 15);
  // Mix a hex color toward dark (#1a1d26) by a factor (0 = original, 1 = dark)
  function darkenColor(hex, factor) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const dr = 0x1a, dg = 0x1d, db = 0x26;  // dark background
    const mr = Math.round(r + (dr - r) * factor);
    const mg = Math.round(g + (dg - g) * factor);
    const mb = Math.round(b + (db - b) * factor);
    return '#' + [mr, mg, mb].map(v => v.toString(16).padStart(2, '0')).join('');
  }
  // 6 grayscale-tinted shades: brightest → darkest (distinct, no transparency)
  const stackDarken = [0, 0.2, 0.4, 0.55, 0.7, 0.82];
  const stackLabels = ['#1', '#2', '#3', '#4', '#5', '其他'];

  // Pre-sort videos once per keyword (on a copy to avoid mutating data)
  const top15Sorted = top15.map(kw => ({
    kw,
    vids: (kw.top_videos || []).slice().sort((a,b) => (b.play_count||0) - (a.play_count||0)),
    g: groups[kw.group] || groups.other || { color: '#4fd1c7' },
  }));

  // Build 6 datasets: video #1 through #5, then "remaining"
  const barDatasets = [];
  for (let s = 0; s < 6; s++) {
    barDatasets.push({
      label: stackLabels[s],
      data: top15Sorted.map(({ kw, vids }) => {
        if (s < 5) return vids[s] ? vids[s].play_count : 0;
        const top5sum = vids.slice(0,5).reduce((a,v) => a + (v.play_count||0), 0);
        return Math.max(0, kw.total_play_today - top5sum);
      }),
      backgroundColor: top15Sorted.map(({ g }) => darkenColor(g.color, stackDarken[s])),
      borderColor: top15Sorted.map(({ g }) => s === 0 ? g.color : 'transparent'),
      borderWidth: s === 0 ? 1 : 0,
      borderRadius: s === 0 ? { topLeft: 4, bottomLeft: 4 } : (s === 5 ? { topRight: 4, bottomRight: 4 } : 0),
      _videoData: top15Sorted.map(({ vids }) => s < 5 ? (vids[s] || null) : null),
    });
  }

  if (chartAvailable) new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels: top15.map(kw => kw.name),
      datasets: barDatasets
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1d26', borderColor: '#1e2330', borderWidth: 1,
          titleFont: { family: 'Noto Serif SC' },
          bodyFont: { family: 'JetBrains Mono', size: 11 },
          callbacks: {
            label: ctx => {
              const vid = ctx.dataset._videoData?.[ctx.dataIndex];
              if (vid) {
                const flag = vid.off_topic ? ' ⚠ 可能偏题' : '';
                const title = (vid.title || '').substring(0, 30);
                return ` ${title}… ${fmt(vid.play_count)}${flag}`;
              }
              if (ctx.dataset.label === '其他') {
                return ` 其他视频合计 ${fmt(ctx.raw)}`;
              }
              return '';
            }
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: '#718096', font: { family: 'JetBrains Mono', size: 10 },
                   callback: v => fmt(v) }
        },
        y: {
          stacked: true,
          grid: { display: false },
          ticks: { autoSkip: false, color: '#e2e8f0', font: { family: 'Noto Serif SC', size: 12 } }
        }
      },
      animation: { duration: 1000, easing: 'easeOutQuart' }
    }
  });

  // ── Bubble cloud ───────────────────────────────────────────────────────
  const legendEl = document.getElementById('bubble-legend');
  const fieldEl = document.getElementById('bubble-field');

  // Render legend
  for (const [gid, g] of Object.entries(groups)) {
    legendEl.innerHTML += `<div class="bubble-legend-item">
      <div class="bubble-legend-dot" style="background:${g.color}"></div>
      ${escapeHtml(g.label)}
    </div>`;
  }

  // Compute bubble sizes (normalize play counts to 36px..110px diameter)
  const plays = data.keywords.map(kw => kw.total_play_today);
  const maxPlay = Math.max(...plays, 1);
  const minPlay = Math.min(...plays, 0);
  const range = maxPlay - minPlay || 1;

  // Build bubble data with sizes
  const bubbles = data.keywords.map(kw => {
    const norm = (kw.total_play_today - minPlay) / range;
    const r = Math.round(18 + norm * 37);  // radius 18..55px
    const g = groups[kw.group] || groups.other || { color: '#4fd1c7' };
    return { kw, norm, r, g, x: 0, y: 0 };
  });

  // Sort largest first for better packing
  bubbles.sort((a, b) => b.r - a.r);

  // Name → bubble index lookup (built AFTER sort so indices match)
  const nameIdx = {};
  bubbles.forEach((b, i) => { nameIdx[b.kw.name] = i; });

  // Circle-packing: spiral seed → force simulation with 3 forces
  const fw = fieldEl.offsetWidth || 600;
  const cx = fw / 2, cy = 160;
  bubbles.forEach((b, i) => {
    const angle = i * 2.4;  // golden angle spiral
    const dist = 12 * Math.sqrt(i);
    b.x = cx + Math.cos(angle) * dist;
    b.y = cy + Math.sin(angle) * dist;
  });

  // Build related-keyword edge list for attraction force
  const edges = [];
  bubbles.forEach((b, i) => {
    (b.kw.related || []).forEach(relName => {
      const j = nameIdx[relName];
      if (j !== undefined && j > i) edges.push([i, j]);
    });
  });

  const pad = 12;
  const maxR = bubbles.length ? bubbles[0].r : 1;
  for (let iter = 0; iter < 200; iter++) {
    // 1. Centering: larger bubbles → stronger pull to center
    for (let i = 0; i < bubbles.length; i++) {
      const sr = bubbles[i].r / maxR;
      const strength = 0.01 + sr * sr * 0.14;
      bubbles[i].x += (cx - bubbles[i].x) * strength;
      bubbles[i].y += (cy - bubbles[i].y) * strength;
    }
    // 2. Related-keyword attraction: pull linked pairs closer
    for (const [i, j] of edges) {
      const a = bubbles[i], bub = bubbles[j];
      const dx = bub.x - a.x, dy = bub.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const ideal = a.r + bub.r + pad + 8;  // target: just touching + small gap
      if (dist > ideal) {
        const pull = (dist - ideal) * 0.02;
        const nx = dx / dist, ny = dy / dist;
        a.x += nx * pull;  a.y += ny * pull;
        bub.x -= nx * pull; bub.y -= ny * pull;
      }
    }
    // 3. Collision resolution — push overlapping bubbles apart
    for (let i = 0; i < bubbles.length; i++) {
      for (let j = i + 1; j < bubbles.length; j++) {
        const a = bubbles[i], bub = bubbles[j];
        const dx = bub.x - a.x, dy = bub.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const minDist = a.r + bub.r + pad;
        if (dist < minDist) {
          const overlap = minDist - dist;
          const totalMass = a.r * a.r + bub.r * bub.r;
          const aRatio = bub.r * bub.r / totalMass;
          const bRatio = a.r * a.r / totalMass;
          const nx = dx / dist, ny = dy / dist;
          a.x -= nx * overlap * aRatio;
          a.y -= ny * overlap * aRatio;
          bub.x += nx * overlap * bRatio;
          bub.y += ny * overlap * bRatio;
        }
      }
    }
  }

  // Clamp bubbles within container width
  bubbles.forEach(b => {
    b.x = Math.max(b.r, Math.min(fw - b.r, b.x));
  });

  // Find bounds and adjust container height
  let minY = Infinity, maxY = -Infinity;
  bubbles.forEach(b => {
    minY = Math.min(minY, b.y - b.r);
    maxY = Math.max(maxY, b.y + b.r);
  });
  const fieldH = maxY - minY + 20;
  fieldEl.style.minHeight = fieldH + 'px';
  const shiftY = -minY + 10;

  // Create DOM elements + build name→element map for highlight
  const bubbleEls = {};
  bubbles.forEach(b => {
    const { kw, norm, r, g } = b;
    const size = r * 2;
    const color = g.color;
    const opacity = 0.25 + norm * 0.55;

    const relatedTags = (kw.related || []).map(r =>
      `<span class="bubble-related-tag">${escapeHtml(r)}</span>`
    ).join('');
    const defText = kw.definition
      ? `<div class="bubble-tip-def"><span class="ai-label">\u24D8 AI\u91CA\u4E49</span>${escapeHtml(kw.definition)}</div>`
      : '';

    const el = document.createElement('div');
    el.className = 'bubble';
    el.tabIndex = 0;
    el.dataset.kwName = kw.name;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.round(b.x - r)}px; top:${Math.round(b.y + shiftY - r)}px;
      background: radial-gradient(circle at 35% 35%, ${color}${Math.round(opacity*255).toString(16).padStart(2,'0')}, ${color}11);
      border: 1px solid ${color}55;
      box-shadow: 0 0 ${Math.round(8 + norm*20)}px ${color}22, inset 0 0 ${Math.round(6+norm*12)}px ${color}11;
      color: ${color};
    `;
    // Dynamic tooltip positioning: avoid overflow on edges
    const tipW = 200;
    let tipLeft, tipTransform;
    if (b.x + tipW / 2 > fw) {
      tipLeft = 'auto'; tipTransform = 'none';
    } else if (b.x - tipW / 2 < 0) {
      tipLeft = '0px'; tipTransform = 'none';
    } else {
      tipLeft = '50%'; tipTransform = 'translateX(-50%)';
    }

    el.innerHTML = `
      <span style="font-size:${Math.max(9, Math.round(9 + norm * 4))}px">${escapeHtml(kw.name)}</span>
      <div class="bubble-tip" style="bottom:calc(100% + 10px); left:${tipLeft}; transform:${tipTransform}; ${tipLeft === 'auto' ? 'right:0;' : ''}">
        <div><strong>${escapeHtml(kw.name)}</strong></div>
        <div class="bubble-tip-play">今日 ${fmt(kw.total_play_today)} 播放</div>
        ${defText}
        ${relatedTags ? `<div class="bubble-related">${relatedTags}</div>` : ''}
      </div>
    `;
    fieldEl.appendChild(el);
    bubbleEls[kw.name] = el;
  });

  // Interactive highlight: hover/focus a bubble → glow its related keywords
  function highlightRelated(kwName, on) {
    const kw = data.keywords.find(k => k.name === kwName);
    if (!kw) return;
    const related = new Set(kw.related || []);
    related.add(kwName);
    for (const [name, el] of Object.entries(bubbleEls)) {
      if (on) {
        el.classList.toggle('bubble-glow', related.has(name) && name !== kwName);
        el.classList.toggle('bubble-dim', !related.has(name));
      } else {
        el.classList.remove('bubble-glow', 'bubble-dim');
      }
    }
  }
  for (const [name, el] of Object.entries(bubbleEls)) {
    el.addEventListener('mouseenter', () => highlightRelated(name, true));
    el.addEventListener('mouseleave', () => highlightRelated(name, false));
    el.addEventListener('focus', () => highlightRelated(name, true));
    el.addEventListener('blur', () => highlightRelated(name, false));
  }

  // ── Keyword cards ──────────────────────────────────────────────────────
  const kwGrid = document.getElementById('kw-grid');
  data.keywords.forEach((kw, idx) => {
    const card = document.createElement('div');
    card.className = 'kw-card';
    const deltaClass = kw.delta_pct >= 0 ? 'up' : 'down';
    const deltaSign = kw.delta_pct >= 0 ? '+' : '';
    const canvasId = 'chart-' + idx;
    const g = groups[kw.group] || groups.other || { color: '#4fd1c7' };

    // Build top videos HTML with author info
    const videos = (kw.top_videos || []).filter(v => v.bvid && /^BV[\w]+$/.test(v.bvid));
    let videosHtml = '';
    if (videos.length > 0) {
      videosHtml = videos.map(v => {
        const url = 'https://www.bilibili.com/video/' + encodeURIComponent(v.bvid);
        const authorHtml = v.mid && v.author
          ? `<div class="video-author">UP: <a href="https://space.bilibili.com/${encodeURIComponent(v.mid)}" target="_blank" rel="noopener">${escapeHtml(v.author)}</a></div>`
          : '';
        const offTopicClass = v.off_topic ? ' off-topic' : '';
        const offTopicBadge = v.off_topic ? '<span class="off-topic-badge">⚠ 可能偏题</span>' : '';
        return `<div class="video-row${offTopicClass}" style="flex-wrap:wrap">
          <div class="video-title" style="width:100%">
            <a href="${url}" target="_blank" rel="noopener">${escapeHtml(v.title || '(无标题)')}</a>${offTopicBadge}
            ${authorHtml}
          </div>
          <div class="video-stats">${fmt(v.play_count)} 播放 · ${fmt(v.like)} 赞${v.danmaku ? ' · ' + fmt(v.danmaku) + ' 弹幕' : ''}${v.comment ? ' · ' + fmt(v.comment) + ' 评论' : ''}</div>
        </div>`;
      }).join('');
    } else {
      videosHtml = '<div style="color:var(--muted);font-size:12px">暂无视频数据</div>';
    }

    // Keyword definition
    const defHtml = kw.definition
      ? `<div class="kw-definition"><span class="ai-label">\u24D8 AI\u91CA\u4E49</span>${escapeHtml(kw.definition)}</div>`
      : '';

    // Related keywords as bubbles
    const relatedHtml = (kw.related || []).length > 0
      ? `<div style="margin-bottom:12px">
           <div class="kw-details-title">关联词</div>
           <div class="bubble-related">${kw.related.map(r =>
             `<span class="bubble-related-tag" style="font-size:10px;padding:2px 8px;border-color:${g.color}44;color:${g.color}">${escapeHtml(r)}</span>`
           ).join('')}</div>
         </div>`
      : '';

    card.innerHTML = `
      <div class="kw-header">
        <div class="kw-name">
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${g.color};margin-right:8px;box-shadow:0 0 6px ${g.color}"></span>
          ${escapeHtml(kw.name)}
        </div>
        <div class="kw-count">搜索结果 ${fmtResultCount(kw.result_count)}
          ${infoIcon('Bilibili 搜索 API 返回的结果数量。API 上限为 1,000，显示 ≥1,000 表示实际结果可能更多。')}
        </div>
      </div>
      <div class="kw-chart-wrap"><canvas id="${canvasId}"></canvas></div>
      <div class="stat-delta ${deltaClass}" style="margin-top:10px">
        今日播放 ${fmt(kw.total_play_today)}
        ${infoIcon('当日搜索结果中前 N 个视频的播放量总和。数据来源：Bilibili 公开搜索 API (api.bilibili.com)。')}
        &nbsp;|&nbsp; 昨日对比 ${deltaSign}${kw.delta_pct}%
      </div>
      ${kw.has_anomaly ? '<div class="anomaly-tag">⚡ 异常</div>' : ''}
      <div class="kw-expand-hint">
        <span class="hint-collapsed">▼ 点击展开详情</span>
        <span class="hint-expanded">▲ 收起</span>
      </div>
      <div class="kw-details">
        <div class="kw-details-inner">
          ${defHtml}
          ${relatedHtml}
          <div class="kw-details-title">热门视频 TOP ${videos.length}</div>
          ${videosHtml}
        </div>
      </div>
    `;

    card.addEventListener('click', (e) => {
      if (e.target.closest('a, .info-tip')) return;
      card.classList.toggle('expanded');
    });

    kwGrid.appendChild(card);

    const trend = kw.trend || [];
    const labels = trend.map((_, i) => {
      const daysAgo = trend.length - 1 - i;
      return daysAgo === 0 ? '今日' : daysAgo === 1 ? '昨日' : `Day-${daysAgo}`;
    });

    if (chartAvailable) new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: trend,
          borderColor: kw.has_anomaly ? '#fc8181' : g.color,
          backgroundColor: kw.has_anomaly ? 'rgba(252,129,129,.08)' : g.color + '14',
          borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: { display: false, beginAtZero: false }
        },
        animation: { duration: 800, easing: 'easeInOutQuart' }
      }
    });
  });
}

// ─── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  // Show loading state (in case of retry)
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="loading" id="loading-state">
      <div class="loading-spinner"></div>
      <div>正在加载数据...</div>
      <div class="loading-status" id="loading-status"></div>
    </div>
  `;
  document.getElementById('last-updated').textContent = '加载中...';

  let timeout;
  try {
    setLoadingStatus('连接服务器...');
    // Cache-bust: append hour-level timestamp so browsers don't serve stale data
    // but identical requests within the same hour still hit cache
    const cacheBust = Math.floor(Date.now() / 3600000);

    // AbortController for timeout — graceful fallback for older browsers (WeChat etc.)
    const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    const fetchOpts = controller ? { signal: controller.signal } : {};
    if (controller) {
      timeout = setTimeout(() => controller.abort(), 12000);
    }

    const res = await fetch(`./data.json?v=${cacheBust}`, fetchOpts);
    if (timeout) clearTimeout(timeout);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    setLoadingStatus('解析数据...');
    const data = await res.json();

    if (!data.keywords || !data.summary) {
      throw new Error('数据格式异常');
    }

    setLoadingStatus('渲染中...');
    renderApp(data);
  } catch (err) {
    if (timeout) clearTimeout(timeout);
    if (err.name === 'AbortError') {
      showError('请求超时 — 网络连接可能不稳定');
    } else if (err.message && err.message.startsWith('HTTP')) {
      showError(`服务器返回错误 (${err.message})`);
    } else {
      showError(err.message || '未知错误');
    }
  }
}

loadData();
</script>
</body>
</html>
