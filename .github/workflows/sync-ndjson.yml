name: Sync NDJSON data from Problem Bank
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout github.io repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout NDJSON files from Problem Bank
        uses: actions/checkout@v4
        with:
          repository: yulinl2/AI4StatMath-Problem-Bank
          ref: claude/parquet-ndjson-export-nyz7ia
          token: ${{ secrets.PROBLEM_BANK_TOKEN }}
          path: _problem_bank
          sparse-checkout: data/ndjson

      - name: Copy NDJSON to github.io
        run: |
          mkdir -p ai4statmath-benchmarks/data
          cp _problem_bank/data/ndjson/*.ndjson ai4statmath-benchmarks/data/
          rm -rf _problem_bank

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai4statmath-benchmarks/data/*.ndjson
          git diff --cached --quiet || git commit -m "Sync NDJSON data files from Problem Bank [skip ci]"
          git push origin main
