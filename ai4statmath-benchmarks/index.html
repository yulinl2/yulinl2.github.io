<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse 14,873 QA problems from 6 public math and statistics benchmarks — CMT-Benchmark, HARDMath, MathTrap, PRBench, StatEval, StatQA — with LaTeX rendering and rich filtering.">
<meta property="og:title" content="AI4StatMath Benchmark Explorer">
<meta property="og:description" content="Browse 14,873 QA problems from 6 public math/stats benchmarks with LaTeX, filters, bookmarks, and ADHD-friendly design.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://yulinl2.github.io/ai4statmath-benchmarks/">
<title>AI4StatMath Benchmark Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous" onload="window._katexReady=true;_flushKatex()"></script>
<style>
/* ══ DESIGN TOKENS ══════════════════════════════════════════════════════════ */
:root{
  /* Surfaces & text */
  --bg:#0c0f1a; --sf:#141828; --sf2:#1b2035; --bd:#252b40;
  --tx:#dde3f0; --mu:#7680a0;
  /* Motion — gentle, eased */
  --t:.3s; --tf:.1s; --ts:.42s;
  --e:cubic-bezier(.25,.1,.25,1); --eo:cubic-bezier(0,0,.3,1);
  /* Opacity */
  --op-dim:.28;
  /* Layout */
  --r:10px; --rs:6px; --hit:38px; --w:1100px; --scroll-top:92px;
  /* Tag tints (soft) */
  --de:rgba(34,197,94,.08); --deb:rgba(34,197,94,.22);
  --dh:rgba(239,68,68,.08); --dhb:rgba(239,68,68,.22);
  --dm:rgba(245,158,11,.08); --dmb:rgba(245,158,11,.22);
  --dx:rgba(99,102,241,.08); --dxb:rgba(99,102,241,.22);
  --ro:rgba(20,184,166,.08); --rob:rgba(20,184,166,.22);
  --rt:rgba(249,115,22,.08); --rtb:rgba(249,115,22,.22);
  --rh:rgba(239,68,68,.08); --rhb:rgba(239,68,68,.22);
}
[data-theme=light]{
  --bg:#f3f5fb; --sf:#fff; --sf2:#eef1f8; --bd:#d8dff0;
  --tx:#1a2040; --mu:#5a6480;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
     background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh}
button{cursor:pointer;font-family:inherit;touch-action:manipulation}
a{color:inherit}

/* ══ STICKY CHROME (one unit — no gap possible) ══════════════════════════════ */
#sticky{position:sticky;top:0;z-index:100;background:var(--bg)}
#hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;
     border-bottom:1px solid var(--bd);backdrop-filter:blur(12px)}
#logo{font-weight:700;font-size:.95rem;flex:1;min-width:0;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#logo em{color:var(--mu);font-style:normal;font-weight:400}
.ibtn{background:none;border:1px solid var(--bd);border-radius:50%;color:var(--mu);
      width:32px;height:32px;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:all var(--t) var(--e)}
.ibtn:hover{background:var(--sf2);color:var(--tx)}
.ibtn:active{transform:scale(.88);transition:transform var(--tf)}
.ibtn svg{width:15px;height:15px;pointer-events:none}
#tabw{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd)}
#tabw::-webkit-scrollbar{display:none}
#tabs{display:flex;min-width:max-content;padding:0 8px}
.tab{padding:9px 13px;border:none;background:none;color:var(--mu);font-size:.82rem;
     font-weight:500;border-bottom:2px solid transparent;cursor:pointer;
     display:flex;align-items:center;gap:5px;white-space:nowrap;
     transition:all var(--t) var(--e)}
.tab:hover{color:var(--tx)}.tab.on{color:var(--tx);border-bottom-color:var(--tc)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--tc);flex-shrink:0}
.cnt{font-size:.7rem;background:var(--sf2);padding:1px 6px;border-radius:10px;color:var(--mu)}
#sb{padding:5px 14px 4px;border-bottom:1px solid var(--bd)}
#sw{position:relative;margin-bottom:3px}
#sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);
        color:var(--mu);width:14px;height:14px;pointer-events:none}
#si{width:100%;padding:6px 10px 6px 30px;background:var(--sf2);
    border:1px solid var(--bd);border-radius:8px;color:var(--tx);
    font-size:.875rem;outline:none;
    box-shadow:inset 3px 0 0 var(--ac,#7c3aed);
    transition:border-color var(--t),box-shadow var(--t)}
#si:focus{border-color:var(--ac,#7c3aed)}
#si::placeholder{color:var(--mu)}
#sl{font-size:.72rem;color:var(--mu);min-height:1em;display:flex;flex-wrap:wrap;
    align-items:center;gap:5px;padding-top:2px}
#sl strong{color:var(--tx)}

/* ══ MAIN ══════════════════════════════════════════════════════════════════ */
#main{max-width:var(--w);margin:0 auto;padding:8px 14px 12px}

/* ── HERO — full-bleed bg (left/right/top flush), content max-width aligned */
#bnr{padding:0;border-bottom:1px solid var(--bd);margin-bottom:0;
     position:relative;overflow:hidden;
     background:color-mix(in srgb,var(--ac,#7c3aed) 4%,var(--bg))}
/* content column: same 14px side padding as #main so title aligns with cards */
.bnrc{max-width:var(--w);margin:0 auto;padding:20px 14px 20px;position:relative}
.bwm{position:absolute;right:-10px;top:-14px;font-size:118px;line-height:1;
     opacity:.05;pointer-events:none;user-select:none;color:var(--ac,#7c3aed);
     font-style:normal;font-weight:900;
     font-family:Georgia,'Times New Roman',serif;transition:color var(--t)}
.bt{font-size:1.35rem;font-weight:800;letter-spacing:-.025em;line-height:1.2;
    margin-bottom:5px;color:var(--ac,#7c3aed)}
.bd{color:var(--mu);font-size:.86rem;line-height:1.6;
    margin-bottom:12px;max-width:580px}
.bl{display:flex;gap:8px;flex-wrap:wrap}
.pl{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;
    font-size:.75rem;font-weight:500;text-decoration:none;
    background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
    transition:all var(--t) var(--e)}
.pl:hover{border-color:var(--ac,#7c3aed);color:var(--ac,#7c3aed)}
.pl:active{transform:scale(.93);transition:transform var(--tf)}

/* ── FILTER BAR */
#fb{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;align-items:center}
.flbl{font-size:.7rem;color:var(--mu);font-weight:700;text-transform:uppercase;
      letter-spacing:.05em;margin-right:2px}
.chip{padding:3px 10px;border-radius:20px;font-size:.77rem;
      border:1px solid var(--bd);background:var(--sf);color:var(--mu);
      cursor:pointer;transition:all var(--t) var(--e);white-space:nowrap}
.chip:hover{border-color:var(--ac,#7c3aed);color:var(--tx)}
.chip.on{background:color-mix(in srgb,var(--ac,#7c3aed) 15%,var(--sf));
         border-color:color-mix(in srgb,var(--ac,#7c3aed) 56%,var(--bd));
         color:color-mix(in srgb,var(--ac,#7c3aed) 90%,var(--tx))}
.chip:active{transform:scale(.93);transition:transform var(--tf)}
.chipc{font-size:.62rem;opacity:.62;margin-left:2px}
/* Active filter chips shown in sticky count bar */
.atag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px 2px 8px;
      border-radius:12px;font-size:.7rem;cursor:pointer;white-space:nowrap;
      background:color-mix(in srgb,var(--ac,#7c3aed) 13%,var(--sf));
      border:1px solid color-mix(in srgb,var(--ac,#7c3aed) 42%,var(--bd));
      color:color-mix(in srgb,var(--ac,#7c3aed) 90%,var(--tx));
      transition:all var(--t) var(--e)}
.atag:hover{background:color-mix(in srgb,var(--ac,#7c3aed) 24%,var(--sf))}
.atag:active{transform:scale(.92);transition:transform var(--tf)}
/* Info tip on filter group labels */
.filtip{cursor:help;font-size:.65rem;opacity:.55}
select.ss{padding:4px 9px;background:var(--sf);border:1px solid var(--bd);
          border-radius:7px;color:var(--tx);font-size:.77rem;cursor:pointer}
.cmpbtn{display:flex;align-items:center;gap:3px;padding:4px 9px;
        background:var(--sf);border:1px solid var(--bd);border-radius:7px;
        color:var(--mu);font-size:.77rem;transition:all var(--t)}
.cmpbtn.on{color:var(--tx);border-color:var(--ac,#7c3aed)}
.fsp{flex:1}

/* ── CARDS GRID */
#cc{display:grid;grid-template-columns:1fr;gap:3px}
@media(min-width:700px){#cc{grid-template-columns:1fr 1fr}}
@media(min-width:1100px){#cc{grid-template-columns:1fr 1fr 1fr}}

/* Dim-out siblings when any card is expanded */
#cc.has-exp .card{opacity:var(--op-dim);transition:opacity var(--ts) var(--e)}
#cc.has-exp .card.exp{opacity:1}
#cc.has-exp .card.nav-focus{opacity:.62}

/* ── CARD — flat hero-style: ::before accent bar, no box border/shadow */
.card{background:var(--sf);border:none;
      border-bottom:1px solid color-mix(in srgb,var(--bd) 50%,transparent);
      border-radius:3px;overflow:hidden;outline:none;position:relative;
      scroll-margin-top:calc(var(--scroll-top) + 14px);scroll-margin-bottom:80px;
      transition:opacity var(--ts) var(--e),box-shadow var(--t) var(--e)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
              background:color-mix(in srgb,var(--cc,#7c3aed) 70%,transparent);
              pointer-events:none}
#cc>.card:nth-child(even){background:var(--sf2)}
#cc>.card:nth-child(even)::before{opacity:.48}
.card.exp{box-shadow:0 2px 20px rgba(0,0,0,.38);z-index:2}
.card.exp::before{opacity:1!important;background:color-mix(in srgb,var(--cc,#7c3aed) 92%,transparent)}
/* Nav focus — visual anchor for ↑↓ navigation */
.card.nav-focus::before{opacity:1;background:color-mix(in srgb,var(--cc,#7c3aed) 82%,transparent)}
.card.nav-focus>.ch{background:color-mix(in srgb,var(--cc,#7c3aed) 7%,var(--sf))}
.ch{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:7px 11px;
    cursor:pointer;user-select:none;transition:background var(--t) var(--e)}
.ch:hover{background:var(--sf2)}
.ch:active{filter:brightness(.9);transition:filter var(--tf)}
.cid{font-size:.7rem;color:var(--mu);font-family:monospace;flex-shrink:0}
.ctags{display:flex;flex-wrap:wrap;gap:3px}
.chmeta{font-size:.67rem;color:var(--mu);flex:1;min-width:0;overflow:hidden;
        text-overflow:ellipsis;white-space:nowrap;margin:0 4px;opacity:.7;cursor:pointer}
.chmeta:hover{opacity:1;text-decoration:underline dotted}
.tag{font-size:.68rem;padding:2px 6px;border-radius:4px;font-weight:500;
     background:var(--sf2);color:var(--mu);border:1px solid var(--bd)}
.tag.de{background:var(--de);color:#4ade80;border-color:var(--deb)}
.tag.dh{background:var(--dh);color:#f87171;border-color:var(--dhb)}
.tag.dm{background:var(--dm);color:#fbbf24;border-color:var(--dmb)}
.tag.dx{background:var(--dx);color:#a5b4fc;border-color:var(--dxb)}
.tag.ro{background:var(--ro);color:#2dd4bf;border-color:var(--rob)}
.tag.rt{background:var(--rt);color:#fb923c;border-color:var(--rtb)}
.tag.rh{background:var(--rh);color:#f87171;border-color:var(--rhb)}
.bkm{background:none;border:none;color:var(--mu);font-size:15px;
     padding:1px 3px;cursor:pointer;margin-left:auto;flex-shrink:0;
     transition:color var(--t)}
.bkm.on{color:#fbbf24}
.exi{color:var(--mu);font-size:10px;flex-shrink:0;
     transition:transform var(--ts) var(--e)}
.card.exp .exi{transform:rotate(180deg)}

/* SHARED TYPE RAMP — preview & stem use identical metrics (no reflow on expand) */
.cbdy,.cstem{font-size:.88rem;line-height:1.7;padding:0 11px 10px;
             white-space:pre-wrap;word-break:break-word}
.cbdy{cursor:pointer}
.cbdy:active,.cstem:active{opacity:.8;transition:opacity var(--tf)}
.cprev{overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}
.cexp{display:none}
.card.exp .cexp{display:block}
.cstem{cursor:pointer;display:block}
/* collapsed: show cbdy (preview), hide cstem */
.card:not(.exp) .cstem{display:none}
.card:not(.exp) .cbdy{display:block}
/* expanded: hide cbdy, show cstem */
.card.exp .cbdy{display:none}
.card.exp .cstem{display:block}
body.cmp .cbdy,.card.exp.cmp .cbdy{display:none!important}
body.cmp .cexp,.card.exp.cmp .cstem{display:none!important}

/* ── SPOILER (solution) */
.spl{margin:6px 11px;border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden}
.sph{display:flex;align-items:center;gap:6px;padding:7px 11px;cursor:pointer;
     font-size:.82rem;font-weight:600;background:var(--sf2);user-select:none;
     transition:filter var(--t) var(--e)}
.sph:hover{filter:brightness(1.07)}
.sph:active{filter:brightness(.88);transition:filter var(--tf)}
.sphn{font-size:.7rem;color:var(--mu);font-weight:400}
.splchev{margin-left:auto;font-size:.75rem;color:var(--mu);
         transition:transform var(--ts) var(--e);display:inline-block}
.spl.rv .splchev{transform:rotate(180deg)}
.spb{border-top:1px solid var(--bd);display:none;max-height:500px;overflow-y:auto}
.spl.rv .spb{display:block}
.spbc{padding:9px 11px;font-size:.85rem;line-height:1.75;
      white-space:pre-wrap;word-break:break-word}
.spbclose{display:block;position:sticky;bottom:0;width:100%;padding:5px 0;
          text-align:center;background:var(--sf2);border:none;
          border-top:1px solid var(--bd);cursor:pointer;font-size:.73rem;
          color:var(--mu);font-family:inherit;
          transition:color var(--t),filter var(--t)}
.spbclose:hover{color:var(--tx)}
.spbclose:active{filter:brightness(.88);transition:filter var(--tf)}

/* ── ANSWER BAR (always visible, tinted fill + shadow — no emoji) */
.cft{padding:5px 11px 7px;display:flex;align-items:center;gap:7px;
     border-top:1px solid var(--bd)}
.ansbtn{
  background:color-mix(in srgb,var(--cc,#7c3aed) 11%,var(--sf));
  border:1px solid color-mix(in srgb,var(--cc,#7c3aed) 22%,var(--bd));
  border-radius:14px;padding:4px 12px;font-size:.74rem;
  color:color-mix(in srgb,var(--cc,#7c3aed) 70%,var(--tx));
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 1px 5px rgba(0,0,0,.2);
  transition:all var(--t) var(--e);white-space:nowrap;font-family:inherit
}
.ansbtn:hover{
  background:color-mix(in srgb,var(--cc,#7c3aed) 18%,var(--sf));
  border-color:color-mix(in srgb,var(--cc,#7c3aed) 38%,var(--bd));
  color:var(--tx)
}
.ansbtn:active{transform:scale(.92);transition:transform var(--tf)}
.abchev{font-size:.6rem;transition:transform var(--t) var(--e);display:inline-block}
.ansb{display:none;border-top:1px solid var(--bd);max-height:400px;overflow-y:auto}
.ansb.rv{display:block}
body.cmp .cft,body.cmp .ansb{display:none!important}
/* text link convention — underline */
.srl{font-size:.72rem;color:var(--mu);text-decoration:underline;
     text-underline-offset:2px;display:flex;align-items:center;gap:3px;
     transition:color var(--t)}
.srl:hover{color:var(--tx)}

/* ── META */
.mac{margin:6px 11px 10px}
.mtog{background:none;border:none;color:var(--mu);font-size:.78rem;cursor:pointer;
      display:flex;align-items:center;gap:3px;padding:3px 0;transition:color var(--t)}
.mtog:hover{color:var(--tx)}
.mtbl{display:none;margin-top:5px;font-size:.75rem;border:1px solid var(--bd);
      border-radius:var(--rs);overflow:hidden;width:100%;border-collapse:collapse}
.mac.op .mtbl{display:table}
.mtbl tr:not(:last-child) td{border-bottom:1px solid var(--bd)}
.mtbl td{padding:4px 9px;vertical-align:top}
.mtbl td:first-child{color:var(--mu);font-weight:600;width:32%;white-space:nowrap}
.mtbl td:last-child{word-break:break-word}
.mtbl tr:nth-child(even) td{background:var(--sf2)}

/* ── STATUS */
#stb{text-align:center;padding:50px 20px;color:var(--mu);grid-column:1/-1}
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--bd);
      border-top-color:var(--ac,#7c3aed);border-radius:50%;
      animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.ebox{background:var(--sf);border:1px solid var(--bd);border-left:4px solid #ef4444;
      border-radius:var(--r);padding:14px;max-width:480px;margin:0 auto;text-align:left}
.rbtn{margin-top:8px;padding:5px 14px;background:var(--sf2);border:1px solid var(--bd);
      border-radius:6px;color:var(--tx);font-size:.82rem;cursor:pointer}

/* ── PAGINATION */
#pg{display:flex;align-items:center;justify-content:center;gap:7px;padding:20px 0;flex-wrap:wrap}
.pbtn{padding:6px 14px;border:1px solid var(--bd);border-radius:7px;background:var(--sf);
      color:var(--tx);font-size:.85rem;cursor:pointer;transition:all var(--t) var(--e)}
.pbtn:hover:not(:disabled){border-color:var(--ac,#7c3aed)}
.pbtn:active{transform:scale(.93);transition:transform var(--tf)}
.pbtn:disabled{opacity:.4;cursor:default}
.pi{font-size:.82rem;color:var(--mu)}

/* ── MODAL */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.74);z-index:1000;
    overflow-y:auto;padding:16px;align-items:flex-start;justify-content:center}
#mo.op{display:flex}
#mb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
    max-width:680px;width:100%;margin:20px auto;padding:18px;position:relative}
#mc{padding-top:6px}
#mclose{position:absolute;top:10px;right:10px;background:none;border:none;
        color:var(--mu);font-size:18px;cursor:pointer;transition:color var(--t)}
#mclose:hover{color:var(--tx)}

/* ── FLOATING NAV */
#fnav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;
      display:none;align-items:center;gap:2px;
      background:rgba(12,15,26,.9);backdrop-filter:blur(14px);
      border:1px solid var(--bd);border-radius:40px;
      padding:5px 8px;box-shadow:0 6px 28px rgba(0,0,0,.55)}
[data-theme=light] #fnav{background:rgba(243,245,251,.93)}
.fnb{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
     background:none;border:none;color:var(--mu);font-size:17px;border-radius:50%;
     cursor:pointer;flex-shrink:0;touch-action:manipulation;
     transition:color var(--t) var(--e),background var(--t) var(--e),transform var(--tf)}
.fnb:hover:not(:disabled){color:var(--tx);background:var(--sf2)}
.fnb:active:not(:disabled){transform:scale(1.26)}
.fnb:disabled{opacity:.22;cursor:default}
#fnpi{font-size:.72rem;color:var(--tx);padding:0 6px;white-space:nowrap;
      min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
.fndiv{width:1px;height:20px;background:var(--bd);margin:0 2px}

/* ── BOOKMARKS */
.bem{text-align:center;padding:50px 20px;color:var(--mu);grid-column:1/-1}

/* ── FOOTER */
footer{border-top:1px solid var(--bd);padding:18px 14px;text-align:center;
       font-size:.77rem;color:var(--mu);max-width:var(--w);margin:30px auto 0}
footer a{color:var(--mu);text-decoration:underline;text-underline-offset:2px}

/* ── KATEX */
.katex-display{overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}

/* ── BENCH SWITCH ANIMATION */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
#cc.anim{animation:fadeSlideIn .35s var(--e) both}
/* ── FLOATING NAV BOUNCE (end-of-list feedback) */
@keyframes fnbBounce{0%,100%{transform:scale(1)}35%{transform:scale(.76)}68%{transform:scale(1.14)}}
.fnb.bnc{animation:fnbBounce .3s var(--e)}
</style>
</head>
<body>

<!-- ONE sticky unit — eliminates the background-leak gap -->
<div id="sticky">
  <header id="hdr">
    <div id="logo">AI4StatMath <em>· Benchmarks</em></div>
    <button class="ibtn" id="rbtn" title="Random problem (R)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
    </button>
    <button class="ibtn" id="tbtn" title="Toggle theme">
      <svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>
  <div id="tabw"><div id="tabs"></div></div>

function tag(v,cls){return v?[{l:String(v),c:cls}]:[]}
function _jsq(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

// ── LATEX PREPROCESS ──────────────────────────────────────────────────────────
// Wraps bare display-math environments in \[...\] so KaTeX auto-render can find
// them. Already-delimited math ($$...$$, \[...\]) is left untouched via the
// alternation: group 1 matches and returns unchanged; group 2 matches and wraps.
const _DISP_ENV='(?:equation|align|gather|multline|flalign)\\*?';
const _prepRe=new RegExp(
  `(\\$\\$[\\s\\S]*?\\$\\$|\\\\\\[[\\s\\S]*?\\\\\\])|(\\\\begin\\{${_DISP_ENV}\\}[\\s\\S]*?\\\\end\\{${_DISP_ENV}\\})`,
  'g');
function prepTex(s){return s.replace(_prepRe,(m,delim)=>delim?m:`\\[\n${m}\n\\]`)}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function decompB64Gz(b64){
  const bin=Uint8Array.from(atob(b64.trim()),c=>c.charCodeAt(0));
  const ds=new DecompressionStream('gzip');
  const w=ds.writable.getWriter(); w.write(bin); w.close();
  return new Response(ds.readable).text();
}
async function load(id){
  if(S.data[id]) return S.data[id];
  if(S.loading[id]) return null;
  S.loading[id]=true; delete S.errors[id];
  showStatus(`<div class="spin"></div><div>Loading ${id}…</div>`);
  try{
    const r=await fetch('data/'+id+'.ndjson.gz.b64');
    if(!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
    const t=await decompB64Gz(await r.text());
    S.data[id]=t.split('\n').filter(Boolean).map(l=>{
      const row=JSON.parse(l);
      if(typeof row.native==='string'){try{row.native=JSON.parse(row.native)}catch{}}
      return row;
    });
    S.loading[id]=false; return S.data[id];
  }catch(err){
    S.loading[id]=false; S.errors[id]=err.message;
    showStatus(`<div class="ebox"><strong>Failed to load ${esc(id)}</strong><br>
      <small style="color:var(--mu)">${esc(err.message)}</small><br>
      <button class="rbtn" onclick="retryLoad('${id}')">↻ Retry</button></div>`);
    return null;
  }
}
async function retryLoad(id){delete S.loading[id];delete S.errors[id];await switchTab(id)}

// ── FILTER + SORT ─────────────────────────────────────────────────────────────
function applyFS(rows,d){
  let r=rows;
  if(S.q.trim()){const q=S.q.toLowerCase();r=r.filter(x=>x.stem&&x.stem.toLowerCase().includes(q))}
  Object.entries(S.filt).forEach(([k,vs])=>{
    if(!vs||!vs.size) return;
    const f=d.filters?.find(x=>x.key===k); if(!f) return;
    r=r.filter(x=>{const v=f.get(x);return v&&vs.has(String(v))});
  });
  if(S.sort==='shuffle') r=[...r].sort(()=>Math.random()-.5);
  else if(S.sort==='ia') r=[...r].sort((a,b)=>(a.source_id||'').localeCompare(b.source_id||''));
  else if(S.sort==='id') r=[...r].sort((a,b)=>(b.source_id||'').localeCompare(a.source_id||''));
  return r;
}

// ── RENDER: CARDS ─────────────────────────────────────────────────────────────
function renderCards(d,rows,animate){
  if(animate){const cc=document.getElementById('cc');cc.classList.remove('anim');void cc.offsetWidth;cc.classList.add('anim');}
  const filtered=applyFS(rows,d);
  const total=filtered.length;
  const allTotal=rows.length;
  const pages=Math.max(1,Math.ceil(total/S.pageSize));
  if(S.page>pages) S.page=pages;
  const s=(S.page-1)*S.pageSize, e=Math.min(s+S.pageSize,total);
  // Sticky count bar: active filter chips + count
  const hasFilter=Object.values(S.filt).some(vs=>vs&&vs.size>0)||S.q.trim().length>0;
  const chips=Object.entries(S.filt)
    .flatMap(([k,vs])=>[...vs].map(v=>`<button class="atag" onclick="togFilt('${_jsq(k)}','${_jsq(v)}')" title="Remove filter">✕ ${esc(String(v))}</button>`)).join('');
  document.getElementById('sl').innerHTML=chips+(
    total===0?'<span style="color:var(--mu)">no matches</span>'
    :hasFilter?`<span style="color:var(--mu)">${total.toLocaleString()} matched of ${allTotal.toLocaleString()}</span>`
    :`<span style="color:var(--mu)">${s+1}–${e} of <strong>${total.toLocaleString()}</strong></span>`
  );
  if(total===0){
    document.getElementById('cc').innerHTML=`<div id="stb"><div style="color:var(--mu)">No problems match your filters.</div><button class="rbtn" onclick="clearF()">Clear filters</button></div>`;
    document.getElementById('pg').innerHTML=''; return;
  }
  document.getElementById('cc').innerHTML=filtered.slice(s,e).map((row,i)=>cardHTML(row,d,s+i)).join('');
  document.getElementById('pg').innerHTML=pages>1?`
    <button class="pbtn" onclick="goPage(${S.page-1})" ${S.page<=1?'disabled':''}>← Prev</button>
    <span class="pi">Page ${S.page} of ${pages}</span>
    <button class="pbtn" onclick="goPage(${S.page+1})" ${S.page>=pages?'disabled':''}>Next →</button>`:'';
  renderNav(total,pages);
}

function cardHTML(row,d,idx){

  const soln=d.sol(row);
  const meta=metaPreviewText(row,d);
  return `<div class="card" style="--cc:${d.color}" id="c${idx}" tabindex="0" data-id="${esc(bid)}" data-idx="${idx}">

    <button class="bkm${bm?' on':''}" onclick="event.stopPropagation();bmTog('${esc(bid)}',${idx})" title="${bm?'Remove bookmark':'Bookmark'}">${bm?'★':'☆'}</button>

    ${soln?spoilerHTML('Solution',soln):''}
    <div class="mac" id="m${idx}">
      <button class="mtog" onclick="togMeta(${idx})">▸ Metadata</button>
      ${metaHTML(row,d)}
    </div>
  </div>
  <div class="cft">
    ${answ?`<button class="ansbtn" onclick="event.stopPropagation();togCardAns(${idx})">Answer <span class="abchev">▾</span></button>`:''}
    <div class="fsp"></div>
    ${row.lookup_url?`<a class="srl" href="${esc(row.lookup_url)}" target="_blank" rel="noopener">Source ↗</a>`:''}
  </div>
  ${answ?`<div class="ansb" id="ans${idx}"><div class="spbc katex-c">${esc(String(answ))}</div><button class="spbclose" onclick="event.stopPropagation();togCardAns(${idx})">▲ collapse</button></div>`:''}</div>`;
}

function spoilerHTML(label,content){
  if(!content) return '';

</div>`;

function metaHTML(row,d){
  const n=row.native||{};
  const skip=new Set(['solution','answer_val','answer_excerpt','solution_excerpt','ground_truth_raw','original_solution','human_annotation','gpt4_annotation','rubric_buckets','relevant_column_raw','results_raw','in_mini']);
  const rows=[['source_id',row.source_id],['benchmark',row.source_benchmark],
    ['ingested_at',row.ingested_at?new Date(row.ingested_at).toLocaleDateString():null],
    ...Object.entries(n).filter(([k])=>!skip.has(k))].filter(([,v])=>v!=null&&v!=='');
  return `<table class="mtbl">${rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('')}</table>`;
}

  document.getElementById('pg').innerHTML='';
  document.getElementById('sl').innerHTML='';
  if(!bms.length){document.getElementById('cc').innerHTML='<div class="bem"><div>No bookmarks yet.</div><small>Click ☆ on any card to save it here.</small></div>';return}
  const cards=bms.map((bid,i)=>{
    const [dsId,sid]=bid.split('::');
    const ds=DS.find(d=>d.id===dsId);
    const rows=S.data[dsId]||[];
    const row=rows.find(r=>r.source_id===sid);
    if(!row||!ds) return '';
    return cardHTML(row,ds,9000+i);
  }).filter(Boolean);
  document.getElementById('cc').innerHTML=cards.length?cards.join(''):'<div class="bem">Bookmarked datasets not loaded yet — visit their tabs first.</div>';
  document.getElementById('fnav').style.display='none';
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
async function switchTab(id){
  // Remember current page before leaving this bench
  if(!S.bkTab&&S.tab!==id&&S.data[S.tab]) S.savedPage[S.tab]=S.page;
  S.tab=id;S.bkTab=false;S.page=S.savedPage[id]||1;S.filt={};S.focused=-1;
  document.getElementById('cc').classList.remove('has-exp');
  renderTabs();
  const d=DS.find(x=>x.id===id);
  renderBanner(d);renderFB(d,null);
  if(!S.data[id]){const r=await load(id);if(!r) return}
  renderFB(d,S.data[id]);renderCards(d,S.data[id],true);
  window.scrollTo({top:0,behavior:'smooth'});  // Reveal full hero on bench switch
}
function showBkTab(){S.bkTab=true;S.tab='__bk__';renderTabs();renderBkTab()}

function expCard(idx){
  const c=document.getElementById('c'+idx);if(!c) return;
  _clearNavFocus();  // Manual expand clears nav-focus highlight
  const wasExp=c.classList.contains('exp');
  c.classList.toggle('exp');S.focused=idx;
  const cc=document.getElementById('cc');
  if(!wasExp){
    cc.classList.add('has-exp');
    c.querySelectorAll('.katex-c').forEach(el=>renderK(el));
  } else {
    if(!cc.querySelector('.card.exp')) cc.classList.remove('has-exp');
  }
}

function togSpl(hEl){
  const s=hEl.closest('.spl');s.classList.toggle('rv');
  if(s.classList.contains('rv')){
    const b=s.querySelector('.spb');if(b) renderK(b);
    const h=hEl.querySelector('.sphn');if(h) h.textContent='';
  } else {
    const h=hEl.querySelector('.sphn');if(h) h.textContent='(tap to reveal)';
  }
}
function togSplClose(btn){
  const s=btn.closest('.spl');s.classList.remove('rv');
  const h=s.querySelector('.sphn');if(h) h.textContent='(tap to reveal)';
}

function togCardAns(idx){
  const b=document.getElementById('ans'+idx);if(!b) return;
  const open=b.classList.toggle('rv');
  if(open) renderK(b);
  const chev=document.querySelector('#c'+idx+' .ansbtn .abchev');
  if(chev) chev.style.transform=open?'rotate(180deg)':'';
}

function tapMeta(idx){
  const c=document.getElementById('c'+idx);if(!c) return;
  if(!c.classList.contains('exp')) expCard(idx);
  const m=document.getElementById('m'+idx);
  if(m&&!m.classList.contains('op')) setTimeout(()=>togMeta(idx),60);
}

function togMeta(idx){
  const m=document.getElementById('m'+idx);if(!m) return;
  m.classList.toggle('op');
  const b=m.querySelector('.mtog');if(b) b.textContent=m.classList.contains('op')?'▾ Metadata':'▸ Metadata';
}

function togFilt(key,val){
  if(!S.filt[key]) S.filt[key]=new Set();
  S.filt[key].has(val)?S.filt[key].delete(val):S.filt[key].add(val);
  S.page=1;refresh();
}
function clearF(){S.filt={};S.q='';document.getElementById('si').value='';refresh()}
function setSort(v){S.sort=v;S.page=1;refresh()}
function togCmp(){S.cmp=!S.cmp;document.body.classList.toggle('cmp',S.cmp);refresh()}

function goPage(p){
  const d=curDS();const r=S.data[S.tab];if(!d||!r) return;
  const pages=Math.max(1,Math.ceil(applyFS(r,d).length/S.pageSize));
  if(p<1){_bounceFnb('fnPgPrev');return}
  if(p>pages){_bounceFnb('fnPgNext');return}
  S.page=p;S.focused=-1;renderCards(d,r);
  document.getElementById('cc').scrollIntoView({behavior:'smooth',block:'start'});
}
function refresh(){
  if(S.bkTab){renderBkTab();return}
  const d=curDS();const r=S.data[S.tab];if(!d||!r) return;
  renderFB(d,r);renderCards(d,r);
}
function curDS(){return DS.find(d=>d.id===S.tab)}

function bmTog(id,idx){
  const on=toggleBM(id);
  const b=document.querySelector('#c'+idx+' .bkm');
  if(b){b.textContent=on?'★':'☆';b.classList.toggle('on',on);b.title=on?'Remove bookmark':'Bookmark'}
  renderTabs();
}

async function doRandom(){
  const loaded=DS.filter(d=>S.data[d.id]);
  if(!loaded.length){await switchTab(DS[0].id);setTimeout(doRandom,200);return}
  const d=loaded[Math.floor(Math.random()*loaded.length)];
  showModal(d.data?.[Math.floor(Math.random()*d.data?.length)]||S.data[d.id][Math.floor(Math.random()*S.data[d.id].length)],d);
}
function showModal(row,d){
  const mc=document.getElementById('mc');
  const tgs=d.tags(row);const answ=d.ans(row);const soln=d.sol(row);
  mc.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;border-bottom:1px solid var(--bd);padding-bottom:10px">
    <span style="color:${d.color};font-weight:600">● ${d.label}</span>
    <span class="cid">${esc(row.source_id||'')}</span>
    ${tgs.map(t=>`<span class="tag ${t.c}">${esc(t.l)}</span>`).join('')}
  </div>
  <div class="cstem katex-c" style="cursor:default;padding:0 0 10px">${esc(prepTex(row.stem||''))}</div>
  ${spoilerHTML('Answer',answ)}
  ${spoilerHTML('Solution',soln)}
  ${row.lookup_url?`<div style="margin-top:10px"><a class="srl" href="${esc(row.lookup_url)}" target="_blank" rel="noopener">Source ↗</a></div>`:''}`;
  document.getElementById('mo').classList.add('op');
  renderK(mc);
}
function closeModal(){document.getElementById('mo').classList.remove('op')}

// ── THEME ─────────────────────────────────────────────────────────────────────
const SVG_MOON=`<svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const SVG_SUN=`<svg id="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
function togTheme(){
  const nd=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',nd);
  document.getElementById('tbtn').innerHTML=nd==='dark'?SVG_MOON:SVG_SUN;
  try{localStorage.setItem('ai4sm_theme',nd)}catch{}
}

// ── QUESTION NAV ──────────────────────────────────────────────────────────────
function _cards(){return document.querySelectorAll('#cc .card')}
function _clearNavFocus(){document.querySelectorAll('#cc .card.nav-focus').forEach(c=>c.classList.remove('nav-focus'))}
function _bounceFnb(id){
  const b=document.getElementById(id);if(!b) return;
  b.classList.remove('bnc');void b.offsetWidth;b.classList.add('bnc');
  b.addEventListener('animationend',()=>b.classList.remove('bnc'),{once:true});
}
function _setNavFocus(cs,idx){
  _clearNavFocus();
  S.focused=idx;
  cs[idx].classList.add('nav-focus');
  cs[idx].scrollIntoView({behavior:'smooth',block:'center'});
  cs[idx].focus({preventScroll:true});
}
function fnFirst(){const cs=_cards();if(cs.length) _setNavFocus(cs,0)}
function fnLast(){const cs=_cards();if(cs.length) _setNavFocus(cs,cs.length-1)}
function fnPrevQ(){
  const cs=_cards();if(!cs.length) return;
  if(S.focused<=0){_bounceFnb('fnPrev');return}
  _setNavFocus(cs,S.focused-1);
}
function fnNextQ(){
  const cs=_cards();if(!cs.length) return;
  if(S.focused>=cs.length-1){_bounceFnb('fnNext');return}
  _setNavFocus(cs,S.focused<0?0:S.focused+1);
}

// ── FLOATING NAV ──────────────────────────────────────────────────────────────
function renderNav(total,pages){
  const nav=document.getElementById('fnav');
  if(total<=0){nav.style.display='none';return}
  nav.style.display='flex';
  nav.innerHTML=
    `<button class="fnb" id="fnFirst" onclick="fnFirst()" title="First question (⤒)">⤒</button>`+
    `<button class="fnb" id="fnPrev" onclick="fnPrevQ()" title="Prev question (k/↑)">↑</button>`+
    `<div class="fndiv"></div>`+
    `<button class="fnb" id="fnPgPrev" onclick="goPage(${S.page-1})" ${S.page<=1?'disabled':''} title="Prev page (←)">‹</button>`+
    `<span id="fnpi">${pages>1?S.page+'/'+pages:total}</span>`+
    `<button class="fnb" id="fnPgNext" onclick="goPage(${S.page+1})" ${S.page>=pages?'disabled':''} title="Next page (→)">›</button>`+
    `<div class="fndiv"></div>`+
    `<button class="fnb" id="fnNext" onclick="fnNextQ()" title="Next question (j/↓)">↓</button>`+
    `<button class="fnb" id="fnLast" onclick="fnLast()" title="Last question (⤓)">⤓</button>`;
}

// ── SWIPE (bench switch) ──────────────────────────────────────────────────────
{
  let _tx=0,_ty=0,_swipeBlocked=false;
  const _mainEl=document.getElementById('main');
  _mainEl.addEventListener('touchstart',e=>{
    _tx=e.touches[0].clientX;_ty=e.touches[0].clientY;
    // Don't trigger bench-switch if the touch starts inside a horizontally scrollable element
    // (e.g. a wide katex-display). Walk up from the touch target to #main.
    _swipeBlocked=false;
    let el=e.target;
    while(el&&el!==_mainEl){
      if(el.scrollWidth>el.clientWidth+2){_swipeBlocked=true;break;}
      el=el.parentElement;
    }
  },{passive:true});
  _mainEl.addEventListener('touchend',e=>{
    if(_swipeBlocked) return;
    const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8&&!S.bkTab){
      const cur=DS.findIndex(d=>d.id===S.tab);
      if(dx<0&&cur<DS.length-1) switchTab(DS[cur+1].id);
      else if(dx>0&&cur>0) switchTab(DS[cur-1].id);
    }
  },{passive:true});
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)){if(e.key==='Escape') e.target.blur();return}
  if(document.getElementById('mo').classList.contains('op')){if(e.key==='Escape') closeModal();return}
  if(e.key==='/'){e.preventDefault();document.getElementById('si').focus()}
  else if(e.key==='r'||e.key==='R') doRandom();
  else if(e.key==='Escape') clearF();
  else if(e.key==='ArrowLeft'){e.preventDefault();goPage(S.page-1)}
  else if(e.key==='ArrowRight'){e.preventDefault();goPage(S.page+1)}
  else if(e.key==='ArrowUp'){e.preventDefault();fnPrevQ()}
  else if(e.key==='ArrowDown'){e.preventDefault();fnNextQ()}
  else if(e.key==='Home'){e.preventDefault();fnFirst()}
  else if(e.key==='End'){e.preventDefault();fnLast()}
  else if(e.key==='j'){e.preventDefault();fnNextQ()}
  else if(e.key==='k'){e.preventDefault();fnPrevQ()}
  else if(e.key==='Enter'&&S.focused>=0) expCard(S.focused);
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
let _st;
document.getElementById('si').addEventListener('input',e=>{
  clearTimeout(_st);_st=setTimeout(()=>{S.q=e.target.value;S.page=1;refresh()},200);
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── MODAL / BUTTON WIRING ─────────────────────────────────────────────────────
document.getElementById('mclose').addEventListener('click',closeModal);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo')) closeModal()});
document.getElementById('rbtn').addEventListener('click',doRandom);
document.getElementById('tbtn').addEventListener('click',togTheme);

// ── STICKY TOP CALIBRATION ────────────────────────────────────────────────────
// ResizeObserver keeps scroll-margin in sync with the sticky chrome height
(function(){
  const sticky=document.getElementById('sticky');
  function calibrate(){
    document.documentElement.style.setProperty('--scroll-top',sticky.offsetHeight+'px');
  }
  calibrate();
  new ResizeObserver(calibrate).observe(sticky);
  window.addEventListener('resize',calibrate);
})();

// ── DEPLOY TIMESTAMP ──────────────────────────────────────────────────────────
// Reads Last-Modified from the page's own HTTP headers — shows which build is live.
(function(){
  fetch(location.href,{method:'HEAD',cache:'no-cache'})
    .then(r=>{const d=r.headers.get('last-modified');const el=document.getElementById('build-ts');
      if(el&&d) el.textContent='Deployed: '+new Date(d).toISOString().replace('T',' ').slice(0,16)+' UTC';
    }).catch(()=>{});
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init(){
  try{const t=localStorage.getItem('ai4sm_theme');if(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('tbtn').innerHTML=t==='dark'?SVG_MOON:SVG_SUN}}catch{}
  renderTabs();
  switchTab('CMT-Benchmark');
})();
</script>
